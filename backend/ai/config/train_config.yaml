# StreetSense — YOLOv8 Training Hyperparameters
# Tuned for road damage detection

# ─── Training ───
epochs: 100
patience: 20          # Early stopping patience
batch: 16             # Batch size (reduce to 8 if GPU OOM)
imgsz: 640            # Input image size
save: true
save_period: 10       # Save checkpoint every N epochs
cache: true           # Cache images in RAM for faster training
device: 0             # GPU device (0 = first GPU, 'cpu' for CPU)
workers: 8            # Data loader workers
project: runs/detect
name: streetsense_v1
exist_ok: true

# ─── Optimizer ───
optimizer: auto       # SGD, Adam, AdamW, auto
lr0: 0.01             # Initial learning rate
lrf: 0.01             # Final learning rate (lr0 * lrf)
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1

# ─── Augmentation ───
hsv_h: 0.015          # Hue augmentation
hsv_s: 0.7            # Saturation augmentation
hsv_v: 0.4            # Value augmentation
degrees: 10.0         # Rotation (±degrees)
translate: 0.1        # Translation (±fraction)
scale: 0.5            # Scale (±gain)
shear: 2.0            # Shear (±degrees)
perspective: 0.0001   # Perspective
flipud: 0.5           # Flip up-down probability
fliplr: 0.5           # Flip left-right probability
mosaic: 1.0           # Mosaic augmentation probability
mixup: 0.1            # Mixup augmentation probability
copy_paste: 0.1       # Copy-paste augmentation probability

# ─── Loss ───
box: 7.5              # Box loss gain
cls: 0.5              # Class loss gain
dfl: 1.5              # Distribution focal loss gain
