# StreetSense — YOLOv8 Dataset Configuration
# This file tells YOLOv8 where to find data and what classes to detect.

# Paths (relative to this file's location or absolute)
path: ../data/datasets/streetsense
train: images/train
val: images/val
test: images/test

# Number of classes
nc: 4

# Class names (index matches label files: 0=pothole, 1=crack, 2=garbage, 3=manhole)
names:
  0: pothole
  1: crack
  2: manhole
  3: garbage
