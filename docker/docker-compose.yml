services:
  postgres:
    image: postgres:16-alpine
    container_name: streetsense-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: streetsense
      POSTGRES_PASSWORD: streetsense_pass
      POSTGRES_DB: streetsense_db
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: postgres -c listen_addresses=*
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U streetsense -d streetsense_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: streetsense-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@streetsense.app
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local